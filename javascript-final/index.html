<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header></header>
    <main>
      <section id="menu">
        <div class="menu-grid">
          <div class="card">
            <div class="card-image-wrapper">
              <img src="images/image.png" alt="leptop" />
            </div>
            <div class="card-content">
              <h3 class="card-title">Leptop</h3>
              <div class="card-footer">
                <span class="origin">Lenovo</span>
                <span class="price">2500 GEL</span>
              </div>
              <button type="button" class="btn">Add to Cart</button>
            </div>
          </div>
          <div class="card">
            <div class="card-image-wrapper">
              <img src="images/image copy.png" alt="kayboard" />
            </div>
            <div class="card-content">
              <h3 class="card-title">Kayboard</h3>
              <div class="card-footer">
                <span class="origin">Logitech G Pro</span>
                <span class="price">350 GEL</span>
              </div>
              <button type="button" class="btn">Add to Cart</button>
            </div>
          </div>
          <div class="card">
            <div class="card-image-wrapper">
              <img src="images/image copy 2.png" alt="PC" />
            </div>
            <div class="card-content">
              <h3 class="card-title">Desktop PC</h3>
              <div class="card-footer">
                <span class="origin">Dell 5060</span>
                <span class="price">3450 GEL</span>
              </div>
              <button type="button" class="btn">Add to Cart</button>
            </div>
          </div>
          <div class="card">
            <div class="card-image-wrapper">
              <img src="images/image copy 3.png" alt="gaming-pc" />
            </div>
            <div class="card-content">
              <h3 class="card-title">Gaming PC</h3>
              <div class="card-footer">
                <span class="origin">Icue Link</span>
                <span class="price">1500 GEL</span>
              </div>
              <button type="button" class="btn">Add to Cart</button>
            </div>
          </div>
          <div class="card">
            <div class="card-image-wrapper">
              <img src="images/image copy 4.png" alt="mouse" />
            </div>
            <div class="card-content">
              <h3 class="card-title">RGB Mouse</h3>
              <div class="card-footer">
                <span class="origin">Redragon M612</span>
                <span class="price">200 GEL</span>
              </div>
              <button type="button" class="btn">Add to Cart</button>
            </div>
          </div>
        </div>
      </section>
      <section id="Carts">
        <div class="cardForCart"></div>
        <div class="total-price">
          <h3>Total Price:</h3>
          <p></p>
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
